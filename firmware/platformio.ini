; PlatformIO 專案設定檔
; 對應 GitHub repo: yoyokuo12-bot/ESP32
; 目標板子: NodeMCU-32S / ESP32 Dev Module (ESP32-WROOM-32)

[env:esp32dev]
platform  = espressif32
board     = esp32dev        ; NodeMCU-32S 等同 esp32dev
framework = arduino

; ─── 序列監視器 ────────────────────────────────────────────────────
monitor_speed = 115200

; ─── 函式庫相依 ────────────────────────────────────────────────────
lib_deps =
    knolleary/PubSubClient @ ^2.8.0       ; MQTT
    bblanchon/ArduinoJson  @ ^6.21.0      ; JSON 序列化
    adafruit/Adafruit BME280 Library      ; BME280 溫濕度（USE_REAL_BME280=1 時）
    adafruit/Adafruit Unified Sensor      ; BME280 相依

; ─── 編譯旗標（對應 main.cpp 的 #define USE_REAL_BME280） ──────────
; MVP 期間：溫濕度使用模擬值，保持 0
; BME280 到貨後改為 1 → -D USE_REAL_BME280=1
build_flags =
    -D USE_REAL_BME280=0

; ─── 說明：若使用 Arduino IDE 而非 PlatformIO ──────────────────────
; 請直接在 main.cpp 頂端修改：
;   #define USE_REAL_BME280  0  (或 1)
; 並在 Arduino IDE > 工具 > 函式庫管理員 安裝以下函式庫：
;   - PubSubClient (by Nick O'Leary)
;   - ArduinoJson  (by Benoit Blanchon)
;   - Adafruit BME280 Library
;   - Adafruit Unified Sensor
